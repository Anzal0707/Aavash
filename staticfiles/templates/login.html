<!DOCTYPE html>
<html lang="en">
<head>
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form </title>
  {% load static %}
  {% load socialaccount %}
  <link href="{% static 'css/logstyle.css' %}" rel="stylesheet">
  <link href="{% static 'css/login-style.css' %}" rel="stylesheet">
</head>
<body>
  <div class="login_form">
    <!-- Login form container -->
    <form method="POST" action="{% url 'account_login' %}">
      {% csrf_token %}
      <h3>Log in with</h3>

      <div class="login_option">
        <!-- Google button -->
        <div class="option">
          <a href="{% provider_login_url 'google' %}">
            <img src="{% static 'images/logos/google.png' %}" alt="Google Login" />
            <span>Google</span>
          </a>
        </div>

        <!-- Apple button -->
        <div class="option">
          <a href="#">
            <img src="{% static 'images/logos/apple.png' %}" alt="Apple" />
            <span>Apple</span>
          </a>
        </div>
      </div>

      <!-- Login option separator -->
      <p class="separator">
        <span>or</span>
      </p>

      <!-- Email input box -->
      <div class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email address" required />
      </div>

      <!-- Paswwrod input box -->
      <div class="input_box">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="% url 'account_reset_password' %">Forgot Password?</a>
        </div>

        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

       <!-- Login button -->
      <button type="submit">Log In</button>

      <p class="sign_up">Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a></p>
    </form>
  </div>
</body>
</html>
